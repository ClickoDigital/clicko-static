<script>
var url = 'https://cdn.waplus.io/waplus-crm/settings/ossembed.js';
var s = document.createElement('script');
s.type = 'text/javascript';
s.async = true;
s.src = url;
var options = {
"enabled": true,
"chatButtonSetting": {
"backgroundColor": "#16BE45",
"ctaText": "Whatsapp Us",
"borderRadius": "50",
"marginLeft": "15",
"marginBottom": "15",
"marginRight": "15",
"position": "right",
"textColor": "#ffffff",
"phoneNumber": "971563551010",
"messageText": "👋🏻Hello",
"trackClick": true
}
}
s.onload = function() {
CreateWhatsappBtn(options);
  
  // Add Google Analytics tracking for WhatsApp clicks
  setTimeout(function() {
    var whatsappBtn = document.querySelector('.waplus-whatsapp-button, [class*="waplus"], [class*="whatsapp"]');
    if (whatsappBtn) {
      whatsappBtn.addEventListener('click', function() {
        // Track WhatsApp button click in Google Analytics
        if (typeof gtag !== 'undefined') {
          gtag('event', 'whatsapp_click', {
            'event_category': 'engagement',
            'event_label': 'WhatsApp Chat Button',
            'value': 1
          });
        }
        
        // Also track in dataLayer for GTM if present
        if (typeof dataLayer !== 'undefined') {
          dataLayer.push({
            'event': 'whatsapp_click',
            'event_category': 'engagement',
            'event_label': 'WhatsApp Chat Button'
          });
        }
      });
    }
  }, 2000); // Wait 2 seconds for button to load
};
var x = document.getElementsByTagName('script')[0];
x.parentNode.insertBefore(s, x);
</script>
